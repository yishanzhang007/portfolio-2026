<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Call abandonment rate over time</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  html, body {
    background: #ffffff;
  }
  body {
    font-family: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, monospace;
    color: #1a1a1a;
    margin: 0;
    padding: 0;
  }
  .stat-row {
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid #eee;
  }
  .stat .label {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat .value {
    font-size: 24px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat .delta {
    font-size: 13px;
    color: #2c8c4a;
    font-weight: 500;
    margin-top: 4px;
  }
  .stat .delta.muted {
    color: #888;
    font-weight: 400;
  }
  .chart-wrap {
    height: 100vh;
    margin: 0;
  }
  .footnote {
    font-size: 12px;
    color: #999;
    margin-top: 8px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="chart-wrap">
  <canvas id="chart"></canvas>
</div>

<script>
const data = [
  { week: "Feb 16",  rate: 32.6, abandoned: 70,  total: 215   },
  { week: "Feb 23",  rate: 30.1, abandoned: 104, total: 345   },
  { week: "Mar 2",   rate: 27.2, abandoned: 69,  total: 254   },
  { week: "Mar 9",   rate: 32.8, abandoned: 128, total: 390   },
  { week: "Mar 16",  rate: 29.8, abandoned: 758, total: 2540  },
  { week: "Mar 23",  rate: 24.4, abandoned: 833, total: 3416  },
  { week: "Mar 30",  rate: 18.6, abandoned: 594, total: 3190  },
  { week: "Apr 6",   rate: 11.8, abandoned: 606, total: 5135  },
  { week: "Apr 13",  rate: 10.5, abandoned: 524, total: 5007  },
  { week: "Apr 20",  rate: 10.6, abandoned: 610, total: 5746  }
];

Chart.defaults.font.family = 'ui-monospace, "SF Mono", "SFMono-Regular", Menlo, monospace';
Chart.defaults.font.size = 12;
Chart.defaults.font.weight = 'normal';
Chart.defaults.color = '#888';

// Apply -5% letter-spacing to all canvas text (axis ticks, tooltip).
const letterSpacingPlugin = {
  id: 'letterSpacing',
  beforeDraw(chart) { chart.ctx.letterSpacing = '0'; },
  beforeDatasetDraw(chart) { chart.ctx.letterSpacing = '0'; },
  beforeTooltipDraw(chart) { chart.ctx.letterSpacing = '0'; }
};
Chart.register(letterSpacingPlugin);

const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');

const gradient = ctx.createLinearGradient(0, 0, 0, canvas.parentElement.clientHeight);
gradient.addColorStop(0, 'rgba(70,70,68,0.10)');
gradient.addColorStop(1, 'rgba(70,70,68,0)');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: data.map(d => d.week),
    datasets: [{
      label: 'Abandonment rate',
      data: data.map(d => d.rate),
      borderColor: '#1a1a1a',
      backgroundColor: gradient,
      borderWidth: 2,
      fill: true,
      tension: 0.32,
      pointBackgroundColor: '#1a1a1a',
      pointBorderColor: '#ffffff',
      pointBorderWidth: 1.5,
      pointRadius: 4,
      pointHoverRadius: 6,
      segment: {
        // last segment dashed (partial data)
        borderDash: ctx => ctx.p1DataIndex === data.length - 1 ? [6, 4] : undefined,
        borderColor: ctx => ctx.p1DataIndex === data.length - 1 ? '#999' : '#1a1a1a'
      }
    }]
  },
  options: {
    maintainAspectRatio: false,
    layout: { padding: { top: 12, right: 8, bottom: 8, left: 0 } },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1a1a',
        padding: 12,
        titleFont: { size: 13, weight: 'bold' },
        bodyFont: { size: 13 },
        callbacks: {
          label: (ctx) => {
            const d = data[ctx.dataIndex];
            return [
              `Abandonment: ${d.rate}%`,
              `Abandoned: ${d.abandoned.toLocaleString()}`,
              `Total calls: ${d.total.toLocaleString()}`
            ];
          }
        }
      }
    },
    scales: {
      y: {
        beginAtZero: true,
        max: 40,
        afterFit: (scale) => {
          // Measure "40%" in the tick font and constrain y-axis width to that + tick padding.
          const c = document.createElement('canvas').getContext('2d');
          c.font = '300 12px ui-monospace, "SF Mono", "SFMono-Regular", Menlo, monospace';
          scale.width = Math.ceil(c.measureText('40%').width) + 12;
        },
        ticks: {
          stepSize: 10,
          padding: 12,
          callback: v => v + '%',
          font: { size: 12, weight: 300 },
          color: '#888'
        },
        grid: { color: '#f0f0f0', drawTicks: false },
        border: { display: false }
      },
      x: {
        ticks: {
          padding: 8,
          font: { size: 12, weight: 300 },
          color: '#888',
          autoSkip: false,
          align: 'start',
          callback: function(value, index) {
            return index % 2 === 0 ? this.getLabelForValue(value) : '';
          }
        },
        grid: { display: false },
        border: { display: false }
      }
    }
  }
});
</script>

</body>
</html>
